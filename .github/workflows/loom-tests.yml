# This workflow runs tests with a fresh Loom build from shipilev.net
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

name: Loom Build Tests

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    # Run nightly at 2:00 AM UTC to detect breaking changes in Loom JDK
    - cron: '0 2 * * *'

jobs:
  test-with-loom:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: shipilev/openjdk:loom

    steps:
    - uses: actions/checkout@v6
    
    - name: Install Maven
      run: |
        cat > /tmp/Download.java << 'JAVA'
        import java.net.URI;
        import java.nio.file.Files;
        import java.nio.file.Path;
        public class Download {
            public static void main(String[] args) throws Exception {
                try (var in = new URI(args[0]).toURL().openStream()) {
                    Files.copy(in, Path.of(args[1]));
                }
            }
        }
        JAVA
        java --enable-preview /tmp/Download.java \
          https://archive.apache.org/dist/maven/maven-3/3.9.9/binaries/apache-maven-3.9.9-bin.tar.gz \
          /tmp/maven.tar.gz
        tar xzf /tmp/maven.tar.gz -C /opt
        ln -s /opt/apache-maven-3.9.9/bin/mvn /usr/local/bin/mvn
    
    - name: Verify Java version
      run: |
        java -version
    
    - name: Verify Java version in Maven
      run: |
        mvn --version
    
    - name: Cache Maven packages
      uses: actions/cache@v6
      with:
        path: /github/home/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
    
    - name: Build with Maven
      run: mvn -B verify --file pom.xml -P '!dev'
